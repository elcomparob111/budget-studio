name: BudgetStudio
attributes:
  LastUpgradeCheck: 2600
options:
  bundleIdPrefix: com.budgetstudio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0
settings:
  base:
    DEVELOPMENT_TEAM: C4PCSYG9KX
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
  configs:
    Release:
      DEAD_CODE_STRIPPING: YES
      VALIDATE_PRODUCT: YES
targets:
  BudgetStudio:
    type: application
    platform: iOS
    sources:
      - path: BudgetStudio
        excludes:
          - "**/.DS_Store"
      - path: Shared
    resources:
      - path: BudgetStudio/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
      - target: BudgetStudioWidget
    entitlements:
      path: BudgetStudio/BudgetStudio.entitlements
      properties:
        com.apple.security.application-groups: [group.com.budgetstudio.app]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetstudio.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Budget Studio
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: BudgetStudio/Info.plist
      properties:
        CFBundleDisplayName: Budget Studio
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        NSFaceIDUsageDescription: Budget Studio uses Face ID to unlock your budget quickly and securely.
        NSCameraUsageDescription: Budget Studio uses the camera to scan receipts and screenshots into transactions.
        NSPhotoLibraryUsageDescription: Budget Studio reads photos and screenshots to fill in transaction details.
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.budgetstudio.app
            CFBundleURLSchemes:
              - budgetstudio

  BudgetStudioWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BudgetStudioWidget
      - path: Shared
    entitlements:
      path: BudgetStudioWidget/BudgetStudioWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.com.budgetstudio.app]
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetstudio.app.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    info:
      path: BudgetStudioWidget/Info.plist
      properties:
        CFBundleDisplayName: Budget Studio
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
